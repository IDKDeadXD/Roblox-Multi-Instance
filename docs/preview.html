<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview – Roblox Instance Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #000000;
      --bg-raised: #0a0a0a;
      --surface:   rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.10);
      --border-md: rgba(255,255,255,0.14);
      --text:      #ffffff;
      --text-sub:  rgba(255,255,255,0.42);
      --text-dim:  rgba(255,255,255,0.22);
      --sidebar-w: 200px;
    }

    body {
      background: #050505;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
    }

    /* ── Outer frame ── */
    .frame-outer {
      border-radius: 14px;
      padding: 1px;
      background: rgba(255,255,255,0.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 48px 100px rgba(0,0,0,0.95),
        0 20px 40px rgba(0,0,0,0.8);
      width: 1000px;
      max-width: 100%;
    }

    .app-window {
      border-radius: 13px;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 640px;
    }

    /* ── Title bar ── */
    .titlebar {
      height: 40px;
      background: #000000;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-icon {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 12.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.01em;
    }

    .win-controls { display: flex; gap: 5px; }

    .win-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.28);
      cursor: default;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: #000000;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 14px 10px;
    }

    .nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.32);
      cursor: default;
      border: 1px solid transparent;
    }

    .nav-item.active {
      background: rgba(255,255,255,0.06);
      color: #ffffff;
      border-color: rgba(255,255,255,0.12);
    }

    .nav-item svg { flex-shrink: 0; }

    .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.75);
      font-size: 10.5px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 20px;
      font-family: 'Geist Mono', monospace;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 10px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 6px rgba(255,255,255,0.5);
      flex-shrink: 0;
    }

    .status-label {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.02em;
    }

    /* ── Main content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 26px;
      scrollbar-width: none;
      background: #000000;
    }

    .content::-webkit-scrollbar { display: none; }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .page-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-top: 3px;
    }

    .btn-add {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: default;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: -0.2px;
    }

    /* ── Account grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* ── Account card ── */
    .card {
      background: #000000;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      height: 50px;
      position: relative;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .avatar-wrap {
      position: absolute;
      bottom: -19px;
      left: 14px;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #000000;
      box-shadow: 0 0 5px rgba(255,255,255,0.6);
    }

    .card-body { padding: 26px 14px 14px; }

    .acct-name {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
      margin-bottom: 2px;
    }

    .acct-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      font-family: 'Geist Mono', monospace;
      margin-bottom: 11px;
    }

    .tags {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 600;
    }

    .tag-active {
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .tag-idle {
      background: transparent;
      color: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .added-label {
      font-size: 10.5px;
      color: rgba(255,255,255,0.18);
    }

    .card-actions { display: flex; gap: 6px; }

    .btn-launch {
      flex: 1;
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: default;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: -0.1px;
    }

    .btn-icon {
      width: 31px; height: 31px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      cursor: default;
      flex-shrink: 0;
      color: rgba(255,255,255,0.40);
    }

    .btn-icon.danger {
      border-color: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.28);
    }
  </style>
</head>
<body>

<div class="frame-outer">
  <div class="app-window">

    <!-- Title bar -->
    <div class="titlebar">
      <div class="titlebar-left">
        <div class="app-icon">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </div>
        <span class="titlebar-title">Roblox Instance Manager</span>
      </div>
      <div class="win-controls">
        <button class="win-btn">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="5" x2="8" y2="5"/></svg>
        </button>
        <button class="win-btn">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="6" height="6" rx="1"/></svg>
        </button>
        <button class="win-btn">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>
        </button>
      </div>
    </div>

    <!-- Layout -->
    <div class="layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="nav">
          <div class="nav-item active">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="9" cy="7" r="4"/>
              <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              <path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
            </svg>
            Accounts
            <span class="badge">3</span>
          </div>
          <div class="nav-item">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
            Settings
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="status-dot"></div>
          <span class="status-label">Ready</span>
        </div>
      </aside>

      <!-- Main content -->
      <main class="content">

        <div class="page-header">
          <div>
            <div class="page-title">Accounts</div>
            <div class="page-sub">3 accounts saved</div>
          </div>
          <button class="btn-add">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Account
          </button>
        </div>

        <div class="grid">

          <!-- Card 1 — Running -->
          <div class="card">
            <div class="card-header">
              <div class="avatar-wrap">
                <div class="avatar">
                  <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="15" r="8" fill="rgba(255,255,255,0.7)"/>
                    <path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="rgba(255,255,255,0.7)"/>
                  </svg>
                  <div class="online-dot"></div>
                </div>
              </div>
            </div>
            <div class="card-body">
              <div class="acct-name">ShadowKnight</div>
              <div class="acct-meta">@shadowknight · 112847203</div>
              <div class="tags">
                <span class="tag tag-active"><span class="tag-dot"></span>Running</span>
                <span class="added-label">· today</span>
              </div>
              <div class="card-actions">
                <button class="btn-launch">Launch</button>
                <button class="btn-icon">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                  </svg>
                </button>
                <button class="btn-icon danger">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Card 2 — Idle -->
          <div class="card">
            <div class="card-header">
              <div class="avatar-wrap">
                <div class="avatar">
                  <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="15" r="8" fill="rgba(255,255,255,0.7)"/>
                    <path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="rgba(255,255,255,0.7)"/>
                  </svg>
                </div>
              </div>
            </div>
            <div class="card-body">
              <div class="acct-name">AzureVoid99</div>
              <div class="acct-meta">@azurevoid99 · 339011452</div>
              <div class="tags">
                <span class="tag tag-idle">Idle</span>
                <span class="added-label">· 3d ago</span>
              </div>
              <div class="card-actions">
                <button class="btn-launch">Launch</button>
                <button class="btn-icon">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                  </svg>
                </button>
                <button class="btn-icon danger">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Card 3 — Running -->
          <div class="card">
            <div class="card-header">
              <div class="avatar-wrap">
                <div class="avatar">
                  <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="15" r="8" fill="rgba(255,255,255,0.7)"/>
                    <path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="rgba(255,255,255,0.7)"/>
                  </svg>
                  <div class="online-dot"></div>
                </div>
              </div>
            </div>
            <div class="card-body">
              <div class="acct-name">NovaPulse</div>
              <div class="acct-meta">@novapulse · 507293841</div>
              <div class="tags">
                <span class="tag tag-active"><span class="tag-dot"></span>Running</span>
                <span class="added-label">· yesterday</span>
              </div>
              <div class="card-actions">
                <button class="btn-launch">Launch</button>
                <button class="btn-icon">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                  </svg>
                </button>
                <button class="btn-icon danger">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>

  </div>
</div>

</body>
</html>
